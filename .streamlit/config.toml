[theme]
base = "light"

primaryColor = "#163B73"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FA"
textColor = "#0F172A"
linkColor = "#1E4E8C"
linkUnderline = false

baseRadius = "medium"
buttonRadius = "medium"
borderColor = "#D7DFEA"
dataframeBorderColor = "#D7DFEA"
dataframeHeaderBackgroundColor = "#EEF3F8"
